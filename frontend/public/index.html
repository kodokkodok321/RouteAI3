<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sortir AI — Urutkan Alamat Otomatis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-row { animation: fadeSlideUp 0.4s ease forwards; opacity: 0; }
    .row-hover:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(99,102,241,0.35); transition: all 0.2s ease; }
  </style>
</head>
<body><div id="root"></div></body>
</html>
